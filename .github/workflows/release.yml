# The combined release workflow: one tag, every platform, one place to download.
#
# Push a version tag like v1.0 and this builds CoinTex on all platforms by
# calling the per-platform workflows, then gathers every artifact and attaches
# them to a single GitHub Release for that tag.
#
#   git tag v1.0 && git push origin v1.0
#
# Each build workflow is reused via `uses:` so there is no duplicated build
# logic, and each can still be run on its own from the Actions tab. Because the
# per-platform workflows no longer trigger on tags themselves, nothing builds
# twice.
#
# Artifacts published on the Release:
#   CoinTex-linux            single-file Linux executable
#   CoinTex-windows.exe      Windows executable
#   CoinTex-macos.zip        macOS .app bundle (zipped)
#   CoinTex-android.apk      debug apk (unsigned, for sideloading/testing)
#   CoinTex-unsigned.ipa     unsigned iOS app (sideload with AltStore/Sideloadly)
#   CoinTex-xcode-project.zip the Xcode project for an App Store upload
#
# The signed Google Play .aab is intentionally NOT built here — it needs the
# private keystore and is produced locally with ./build_android.sh.

name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  desktop:
    uses: ./.github/workflows/desktop-build.yml

  android:
    uses: ./.github/workflows/android-build.yml

  ios:
    uses: ./.github/workflows/ios-build.yml

  publish:
    name: Publish the GitHub Release
    needs: [desktop, android, ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Pull down every artifact produced by the build jobs above. Each lands
      # in its own subfolder named after the artifact.
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Flatten and give the files release-friendly names with their platform
      # and extension, so a visitor can tell them apart at a glance.
      - name: Stage the release files
        run: |
          mkdir -p release
          cp "artifacts/CoinTex-linux/CoinTex"                   "release/CoinTex-linux"
          cp "artifacts/CoinTex-windows/CoinTex.exe"             "release/CoinTex-windows.exe"
          cp "artifacts/CoinTex-macos/CoinTex-macos.zip"         "release/CoinTex-macos.zip"
          cp artifacts/CoinTex-android/*.apk                     "release/CoinTex-android.apk"
          cp "artifacts/CoinTex-unsigned-ipa/CoinTex-unsigned.ipa" "release/CoinTex-unsigned.ipa"
          cp "artifacts/CoinTex-xcode-project/CoinTex-xcode-project.zip" "release/CoinTex-xcode-project.zip"
          echo "Release files:"
          ls -lh release

      - name: Create the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            CoinTex ${{ github.ref_name }}

            Downloads below, one per platform:

            - **Windows** — `CoinTex-windows.exe`
            - **macOS** — `CoinTex-macos.zip` (unzip and open CoinTex.app)
            - **Linux** — `CoinTex-linux` (`chmod +x` then run)
            - **Android** — `CoinTex-android.apk` (unsigned debug build; enable "install unknown apps")
            - **iPhone** — `CoinTex-unsigned.ipa` (sideload with AltStore or Sideloadly — see IOS_INSTALL.md), or `CoinTex-xcode-project.zip` to build in Xcode

            The signed Google Play `.aab` is built separately with `./build_android.sh`.
