# Quick desktop sanity check that runs on every push and PR.
#
# It does three things:
#   1. Installs the Python requirements on a clean Ubuntu runner.
#   2. Byte-compiles every Python file (catches syntax errors).
#   3. Boots the app under xvfb (catches import errors and obvious startup crashes).
#
# Catches the kind of regressions that buildozer / kivy-ios would only surface
# after a 30-90 minute build.

name: Desktop CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: desktop-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install SDL2 and Kivy runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb libsdl2-2.0-0 libsdl2-image-2.0-0 libsdl2-mixer-2.0-0 \
            libsdl2-ttf-2.0-0 libgl1-mesa-dri libgles2 libmtdev1

      - name: Install Python requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Byte-compile every .py
        run: |
          # find -regex puts the longer alternative first so .py and .pyi both match.
          python -m compileall -q .

      - name: Boot the app under xvfb (3 second smoke test)
        env:
          SDL_AUDIODRIVER: dummy
        run: |
          # Start the app, wait briefly, kill it. If it crashes during import or
          # the first frame, this step fails. Successful exit (via SIGTERM) is OK.
          xvfb-run -a timeout --preserve-status 3 python main.py || code=$?
          # 124 = timeout fired (good — the app stayed up). 143 = SIGTERM (good).
          # 0 = app exited cleanly. Anything else is a real failure.
          if [ "${code:-0}" != "0" ] && [ "${code:-0}" != "124" ] && [ "${code:-0}" != "143" ]; then
              echo "main.py exited $code under xvfb" >&2
              exit "$code"
          fi
          echo "Smoke test passed"
